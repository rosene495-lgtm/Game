<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Click The Box</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
      text-align: center;
      margin: 0;
      padding: 10px;
    }

    h1 {
      margin: 10px 0;
    }

    #stats {
      font-size: 18px;
      margin-bottom: 10px;
    }

    #game-area {
      width: 90vw;
      max-width: 400px;
      height: 400px;
      border: 2px solid white;
      margin: auto;
      position: relative;
      background: #0f172a;
      touch-action: manipulation;
    }

    #box {
      background: #22c55e;
      position: absolute;
      border-radius: 8px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 10px;
      cursor: pointer;
    }

    #leaderboard {
      margin-top: 20px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }

    input {
      padding: 8px;
      font-size: 16px;
      width: 200px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<h1>Click The Box 🎯</h1>

<!-- Player Name Input -->
<div id="player-setup">
  <input type="text" id="playerName" placeholder="Enter your name" maxlength="12">
  <br>
  <button onclick="startGame()">Start Game</button>
</div>

<div id="stats">
  Player: <span id="currentPlayer">---</span> |
  Score: <span id="score">0</span> |
  Level: <span id="level">1</span> |
  Time: <span id="time">30</span>s
</div>

<div id="game-area">
  <div id="box"></div>
</div>

<div id="leaderboard">
  <h3>🏆 Leaderboard</h3>
  <ol id="scores"></ol>
</div>

<!-- Sound Effects -->
<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
<audio id="levelSound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>
<audio id="endSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>
  const box = document.getElementById("box");
  const gameArea = document.getElementById("game-area");
  const scoreEl = document.getElementById("score");
  const timeEl = document.getElementById("time");
  const levelEl = document.getElementById("level");
  const scoresList = document.getElementById("scores");
  const playerNameInput = document.getElementById("playerName");
  const currentPlayerEl = document.getElementById("currentPlayer");

  const clickSound = document.getElementById("clickSound");
  const levelSound = document.getElementById("levelSound");
  const endSound = document.getElementById("endSound");

  let score, time, level, playerName;
  let moveInterval, timerInterval;
  let boxSize, speed;

  function randomPosition() {
    const maxX = gameArea.clientWidth - boxSize;
    const maxY = gameArea.clientHeight - boxSize;
    box.style.left = Math.random() * maxX + "px";
    box.style.top = Math.random() * maxY + "px";
  }

  function updateDifficulty() {
    boxSize = Math.max(20, 60 - level * 5);
    speed = Math.max(300, 1000 - level * 100);

    box.style.width = boxSize + "px";
    box.style.height = boxSize + "px";

    clearInterval(moveInterval);
    moveInterval = setInterval(randomPosition, speed);
  }

  function levelUp() {
    level++;
    levelEl.textContent = level;
    levelSound.play();
    updateDifficulty();
  }

  function handleBoxClick() {
    if (time <= 0) return;

    score++;
    scoreEl.textContent = score;
    clickSound.play();
    randomPosition();

    if (score % 10 === 0) {
      levelUp();
    }
  }

  box.addEventListener("click", handleBoxClick);
  box.addEventListener("touchstart", handleBoxClick);

  function startGame() {
    playerName = playerNameInput.value.trim();

    if (!playerName) {
      alert("Please enter your name!");
      return;
    }

    document.getElementById("player-setup").style.display = "none";
    currentPlayerEl.textContent = playerName;

    score = 0;
    time = 30;
    level = 1;

    scoreEl.textContent = score;
    timeEl.textContent = time;
    levelEl.textContent = level;

    updateDifficulty();
    randomPosition();

    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      time--;
      timeEl.textContent = time;

      if (time <= 0) {
        endGame();
      }
    }, 1000);
  }

  function endGame() {
    clearInterval(moveInterval);
    clearInterval(timerInterval);
    endSound.play();

    saveScore({
      name: playerName,
      score: score,
      level: level
    });

    loadLeaderboard();

    document.getElementById("player-setup").style.display = "block";
    alert(`Game Over ${playerName}! Score: ${score}, Level: ${level}`);
  }

  function saveScore(entry) {
    let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];
    leaderboard.push(entry);

    leaderboard.sort((a, b) => {
      if (b.score === a.score) {
        return b.level - a.level;
      }
      return b.score - a.score;
    });

    leaderboard = leaderboard.slice(0, 5);
    localStorage.setItem("leaderboard", JSON.stringify(leaderboard));
  }

  function loadLeaderboard() {
    let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];
    scoresList.innerHTML = "";

    leaderboard.forEach(entry => {
      const li = document.createElement("li");
      li.textContent = `${entry.name} — Score: ${entry.score} (Level ${entry.level})`;
      scoresList.appendChild(li);
    });
  }

  loadLeaderboard();
</script>

</body>
</html>
